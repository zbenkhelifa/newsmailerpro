name: Build & Release MailCentPro

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de release (ex: v1.0)"
        required: true
        default: "v1.0"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            zip_name: MailCentPro-Windows.zip
          - os: macos-latest
            platform: Mac
            zip_name: MailCentPro-Mac.zip
          - os: ubuntu-latest
            platform: Linux
            zip_name: MailCentPro-Linux.zip

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (Windows / Mac)
        if: matrix.platform != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dépendances système (Linux)
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-tk

      - name: Installer PyInstaller
        run: pip install pyinstaller
        shell: bash

      - name: Compiler (Windows)
        if: matrix.platform == 'Windows'
        run: pyinstaller --onefile --windowed --name "MailCentPro" --hidden-import tkinter --clean mailcentpro.py

      - name: Compiler (Mac)
        if: matrix.platform == 'Mac'
        run: pyinstaller --onefile --windowed --name "MailCentPro" --hidden-import tkinter --clean mailcentpro.py

      - name: Compiler (Linux)
        if: matrix.platform == 'Linux'
        run: python3 -m PyInstaller --onefile --name "MailCentPro" --hidden-import tkinter --clean mailcentpro.py

      - name: Créer le zip (Windows)
        if: matrix.platform == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_tmp
          Copy-Item dist\MailCentPro.exe release_tmp\
          Copy-Item -Recurse data release_tmp\data
          Compress-Archive -Path release_tmp\* -DestinationPath ${{ matrix.zip_name }}

      - name: Créer le zip (Mac / Linux)
        if: matrix.platform != 'Windows'
        run: |
          mkdir -p release_tmp
          cp dist/MailCentPro release_tmp/
          cp -r data release_tmp/data
          cd release_tmp && zip -r ../${{ matrix.zip_name }} .

      - name: Upload dans la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: ${{ matrix.zip_name }}
